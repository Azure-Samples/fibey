# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: fibey-agent
description: "Fibey — AI assistant for fiber optics field operations. Uses Foundry Toolbox (work orders, inventory, knowledge base) with skill-based routing for field briefings, work order management, and troubleshooting."
metadata:
  tags:
    - Agent Framework
    - Foundry Toolbox
    - MCP
    - Skills
    - Fiber Optics
    - Field Operations
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "1"
  memory: "2Gi"
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: gpt-4.1-mini
  - name: TOOLBOX_MCP_URL
    # Populated from the azd environment (set by `azd provision` from the
    # TOOLBOX_MCP_URL infra output). Format:
    #   https://<account>.services.ai.azure.com/api/projects/<project>/toolboxes/<name>/mcp
    value: "${TOOLBOX_MCP_URL}"
